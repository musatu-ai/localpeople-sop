<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Local People · Operasyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --offwhite:#fefeeb;
  --black:#000006;
  --teal:#338a73;
  --coral:#fc645e;
  --blue:#b8d4d8;
  --peach:#f4d160;
  --dark-teal:#1f5c4a;
  --dark-coral:#c73c38;
  --border:rgba(0,0,6,.1);
  --border-soft:rgba(0,0,6,.06);
  --shadow:0 2px 12px rgba(0,0,6,.06);
  --shadow-md:0 8px 32px rgba(0,0,6,.1);
  --mono:'Space Mono',monospace;
  --sans:'DM Sans',-apple-system,sans-serif;
  --r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--offwhite);color:var(--black);font-size:15px;line-height:1.5;}

/* SCREENS */
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ─────────────────────────────── */
#login-screen{
  background:var(--black);
  align-items:center;justify-content:center;padding:2rem;
  position:relative;overflow:hidden;
}
.login-dots{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.login-dots span{
  position:absolute;border-radius:50%;
  animation:floatDot 8s ease-in-out infinite;
}
.login-dots span:nth-child(1){width:120px;height:120px;background:var(--teal);opacity:.15;top:-20px;right:10%;animation-delay:0s;}
.login-dots span:nth-child(2){width:80px;height:80px;background:var(--coral);opacity:.2;bottom:15%;left:5%;animation-delay:2s;}
.login-dots span:nth-child(3){width:60px;height:60px;background:var(--peach);opacity:.15;top:40%;right:5%;animation-delay:4s;}
.login-dots span:nth-child(4){width:200px;height:200px;background:var(--blue);opacity:.06;bottom:-60px;right:-40px;animation-delay:1s;}
@keyframes floatDot{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

.login-card{
  position:relative;z-index:2;
  width:100%;max-width:380px;
  padding:2.5rem 2rem;
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

.login-brand{text-align:center;margin-bottom:2rem;}
.lp-monogram{
  width:72px;height:72px;margin:0 auto 14px;
  background:var(--offwhite);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:22px;font-weight:700;
  color:var(--black);letter-spacing:-1px;
  box-shadow:0 8px 32px rgba(254,254,235,.15);
}
.login-wordmark{
  font-family:var(--mono);font-size:20px;font-weight:700;
  color:var(--offwhite);letter-spacing:2px;text-transform:uppercase;
}
.login-tagline{
  font-size:11px;color:rgba(254,254,235,.35);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-top:6px;font-weight:400;
}
.login-divider{height:1px;background:rgba(254,254,235,.08);margin:1.5rem 0;}
.lf-group{margin-bottom:1rem;}
.lf-group label{
  display:block;font-size:10px;font-weight:700;font-family:var(--mono);
  color:rgba(254,254,235,.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;
}
.lf-group input{
  width:100%;padding:13px 16px;
  border:1px solid rgba(254,254,235,.12);border-radius:10px;
  font-size:15px;font-family:var(--sans);
  color:var(--offwhite);background:rgba(254,254,235,.05);outline:none;transition:.2s;
}
.lf-group input::placeholder{color:rgba(254,254,235,.2);}
.lf-group input:focus{border-color:var(--teal);background:rgba(51,138,115,.08);}
#lerr{
  margin-bottom:12px;padding:10px 14px;
  background:rgba(252,100,94,.1);border:1px solid rgba(252,100,94,.3);
  border-radius:8px;color:#fc9a97;font-size:13px;display:none;
}
.btn-login{
  width:100%;padding:14px;
  background:var(--offwhite);color:var(--black);
  border:none;border-radius:10px;
  font-size:14px;font-weight:700;font-family:var(--mono);
  cursor:pointer;transition:.15s;letter-spacing:1px;text-transform:uppercase;
  margin-top:.25rem;
}
.btn-login:hover{background:#f0f0d8;}
.btn-login:active{transform:scale(.99);}
.btn-login:disabled{opacity:.4;cursor:not-allowed;}
.login-footer{text-align:center;margin-top:1.5rem;font-size:10px;color:rgba(254,254,235,.15);font-family:var(--mono);letter-spacing:1px;}

/* ── APP SHELL ─────────────────────────── */
#app-screen{background:var(--offwhite);}

/* TOPBAR */
.topbar{
  background:var(--black);height:54px;padding:0 16px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.topbar .back-btn{
  background:none;border:none;color:rgba(254,254,235,.5);
  font-size:24px;cursor:pointer;padding:0;line-height:1;
  display:none;align-items:center;transition:.15s;
}
.topbar .back-btn:hover{color:var(--offwhite);}
.topbar .back-btn.visible{display:flex;}
.topbar .t-logo{
  font-family:var(--mono);font-size:14px;font-weight:700;
  color:var(--offwhite);flex:1;letter-spacing:1px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar .t-role{
  font-size:10px;font-family:var(--mono);
  padding:4px 10px;border-radius:20px;letter-spacing:.5px;
  white-space:nowrap;font-weight:700;text-transform:uppercase;
}
.role-admin{background:var(--peach);color:var(--black);}
.role-manager{background:var(--teal);color:#fff;}
.role-staff{background:rgba(254,254,235,.12);color:rgba(254,254,235,.6);}
.topbar .logout-btn{
  background:none;border:none;color:rgba(254,254,235,.25);
  cursor:pointer;font-size:11px;font-family:var(--mono);
  transition:.15s;padding:0 0 0 8px;letter-spacing:.5px;
}
.topbar .logout-btn:hover{color:rgba(254,254,235,.6);}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* SUBMIT BAR */
.sbar{
  flex-shrink:0;background:var(--offwhite);
  border-top:1px solid var(--border-soft);
  padding:12px 16px;display:flex;gap:10px;align-items:center;
}
.prog-txt{flex:1;font-size:13px;color:rgba(0,0,6,.4);}

/* ── HOME / APP GRID ───────────────────── */
.home-hero{
  background:var(--black);
  padding:24px 20px 48px;position:relative;overflow:hidden;
}
/* Brand dots in hero */
.hero-dots{position:absolute;inset:0;pointer-events:none;}
.hero-dots span{position:absolute;border-radius:50%;opacity:.3;}
.hero-dots span:nth-child(1){width:80px;height:80px;background:var(--teal);top:-20px;right:20%;}
.hero-dots span:nth-child(2){width:50px;height:50px;background:var(--coral);bottom:10px;right:8%;}
.hero-dots span:nth-child(3){width:30px;height:30px;background:var(--peach);top:20px;right:40%;}
.hero-date{font-family:var(--mono);font-size:10px;color:rgba(254,254,235,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.hero-name{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--offwhite);line-height:1.2;}
.hero-shift{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;padding:5px 12px;
  background:rgba(254,254,235,.07);border:1px solid rgba(254,254,235,.12);
  border-radius:20px;font-size:11px;font-family:var(--mono);
  color:rgba(254,254,235,.45);letter-spacing:.5px;
}
.hero-shift-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}

/* White curve separator */
.hero-curve{
  position:absolute;bottom:-2px;left:-5%;right:-5%;
  height:40px;background:var(--offwhite);border-radius:50% 50% 0 0;
}

/* PENDING ALERT BAR */
.pending-bar{
  margin:16px 16px 0;
  background:var(--coral);border-radius:var(--r-sm);
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:.15s;
}
.pending-bar:hover{opacity:.9;}
.pending-bar .pb-icon{font-size:18px;}
.pending-bar .pb-text{flex:1;font-size:13px;font-weight:600;color:#fff;}
.pending-bar .pb-count{
  background:rgba(255,255,255,.25);color:#fff;
  font-size:12px;font-weight:700;font-family:var(--mono);
  padding:2px 8px;border-radius:20px;
}

/* SECTION LABEL */
.grid-section{padding:20px 16px 8px;}
.grid-label{
  font-family:var(--mono);font-size:9px;font-weight:700;
  color:rgba(0,0,6,.3);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:14px;
}

/* APP GRID */
.app-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;padding:0 16px;
}
.app-tile{
  background:#fff;border:1px solid var(--border-soft);
  border-radius:var(--r);padding:16px 12px 14px;
  cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:10px;
  box-shadow:var(--shadow);
  animation:tileIn .4s ease both;
  position:relative;overflow:hidden;
}
.app-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.app-tile:active{transform:scale(.97);}
@keyframes tileIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.app-tile:nth-child(1){animation-delay:.04s;}
.app-tile:nth-child(2){animation-delay:.08s;}
.app-tile:nth-child(3){animation-delay:.12s;}
.app-tile:nth-child(4){animation-delay:.16s;}
.app-tile:nth-child(5){animation-delay:.20s;}
.app-tile:nth-child(6){animation-delay:.24s;}
.app-tile:nth-child(7){animation-delay:.28s;}

.at-icon{
  width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;position:relative;
}
/* Dot decoration in tile */
.at-icon::after{
  content:'';position:absolute;
  width:12px;height:12px;border-radius:50%;
  bottom:-2px;right:-2px;
  opacity:.6;
}
.at-label{font-size:12px;font-weight:600;color:var(--black);line-height:1.3;}
.at-sub{font-size:10px;color:rgba(0,0,6,.35);margin-top:-6px;}
.at-badge{
  position:absolute;top:8px;right:8px;
  background:var(--coral);color:#fff;
  font-size:10px;font-weight:700;font-family:var(--mono);
  padding:2px 6px;border-radius:10px;
  min-width:20px;text-align:center;
}

/* Tile color themes */
.tile-teal .at-icon{background:rgba(51,138,115,.12);}
.tile-teal .at-icon::after{background:var(--teal);}
.tile-coral .at-icon{background:rgba(252,100,94,.1);}
.tile-coral .at-icon::after{background:var(--coral);}
.tile-peach .at-icon{background:rgba(244,209,96,.2);}
.tile-peach .at-icon::after{background:var(--peach);}
.tile-blue .at-icon{background:rgba(184,212,216,.3);}
.tile-blue .at-icon::after{background:var(--blue);}
.tile-dark .at-icon{background:rgba(0,0,6,.06);}
.tile-dark .at-icon::after{background:var(--black);}
.tile-purple .at-icon{background:rgba(150,100,200,.1);}
.tile-purple .at-icon::after{background:#9664c8;}

/* SLOGAN */
.home-slogan{
  margin:20px 16px 8px;
  padding:16px;
  border:1px solid var(--border-soft);
  border-radius:var(--r);
  background:#fff;
  display:flex;align-items:center;gap:12px;
}
.slogan-dots{display:flex;gap:5px;flex-shrink:0;}
.slogan-dots span{width:10px;height:10px;border-radius:50%;}
.slogan-text{font-family:var(--mono);font-size:11px;color:rgba(0,0,6,.4);line-height:1.6;letter-spacing:.3px;}

/* ── FORM LIST ─────────────────────────── */
.form-list{padding:12px 16px;}
.form-item{
  background:#fff;border:1px solid var(--border-soft);
  border-radius:var(--r-sm);padding:13px 15px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:.15s;box-shadow:var(--shadow);
}
.form-item:hover{border-color:var(--teal);box-shadow:var(--shadow-md);}
.fi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.fi-info{flex:1;}
.fi-title{font-size:13px;font-weight:600;}
.fi-meta{font-size:11px;color:rgba(0,0,6,.35);margin-top:1px;}
.fi-arr{color:rgba(0,0,6,.2);font-size:18px;}

/* ── TASKS ─────────────────────────────── */
.task-content{padding:0 16px;padding-bottom:100px;}
.sec-hdr{
  background:var(--black);color:var(--offwhite);
  padding:8px 12px;border-radius:8px;
  font-family:var(--mono);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;margin:18px 0 8px;
}
.task{
  padding:12px;border-radius:10px;margin-bottom:7px;
  border:1.5px solid var(--border-soft);background:#fff;transition:.15s;
}
.task.done{background:#f0fff8;border-color:#a0d8c4;}
.task.crit{border-left:3px solid var(--coral);}
.task.crit.done{border-left-color:var(--teal);}
.task-row{display:flex;align-items:flex-start;gap:10px;}
.chk{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  background:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;margin-top:2px;transition:.15s;user-select:none;
}
.chk.on{background:var(--teal);border-color:var(--teal);color:#fff;font-size:13px;font-weight:700;}
.task-txt{flex:1;font-size:13px;line-height:1.5;}
.task-txt.done{color:rgba(0,0,6,.3);text-decoration:line-through;}
.crit-lbl{font-size:10px;font-weight:700;color:var(--coral);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-family:var(--mono);}
.photo-area{margin-top:8px;}
.photo-btn{
  display:flex;align-items:center;gap:6px;font-size:12px;
  color:var(--teal);cursor:pointer;padding:8px 12px;
  background:rgba(51,138,115,.06);border-radius:8px;
  border:1px dashed rgba(51,138,115,.3);width:100%;font-weight:600;
}
.photo-ok{font-size:11px;color:var(--teal);margin-top:4px;font-weight:600;}
.photo-preview{width:72px;height:72px;border-radius:8px;object-fit:cover;margin-top:6px;border:2px solid var(--border-soft);cursor:pointer;}

/* ── CONTENT PAGES ─────────────────────── */
.page-content{padding:16px;padding-bottom:40px;}
.rules-section{margin-bottom:16px;}
.rules-section h2{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--black);
  background:rgba(0,0,6,.04);padding:10px 14px;
  border-radius:8px;margin-bottom:8px;border-left:3px solid var(--teal);
  letter-spacing:.5px;text-transform:uppercase;
}
.rules-section li{font-size:13px;padding:7px 0;border-bottom:1px solid var(--border-soft);line-height:1.6;padding-left:16px;position:relative;list-style:none;}
.rules-section li::before{content:"—";position:absolute;left:0;color:var(--teal);font-size:10px;top:9px;}
.rules-section li:last-child{border-bottom:none;}

.jd-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.jd-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);}
.jd-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.jd-aim{font-size:13px;color:rgba(0,0,6,.5);line-height:1.7;padding:10px 12px;background:rgba(0,0,6,.03);border-radius:8px;margin-bottom:12px;}
.jd-section{margin-bottom:14px;}
.jd-section h3{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--black);background:rgba(0,0,6,.04);padding:7px 10px;border-radius:6px;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.jd-section li{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border-soft);line-height:1.6;padding-left:14px;position:relative;list-style:none;}
.jd-section li::before{content:"•";position:absolute;left:0;color:var(--teal);}
.jd-section li:last-child{border-bottom:none;}

/* SHIFT */
.shift-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.shift-table{width:100%;border-collapse:collapse;font-size:11px;min-width:480px;}
.shift-table th{background:var(--black);color:rgba(254,254,235,.7);padding:9px 6px;text-align:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.shift-table th:first-child{text-align:left;padding-left:12px;}
.shift-table td{padding:8px 5px;text-align:center;border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);}
.shift-table td:first-child{font-weight:600;font-size:12px;text-align:left;padding-left:12px;background:rgba(0,0,6,.02);}
.shift-cell{padding:3px 6px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block;}
.s1{background:rgba(184,212,216,.4);color:#1a6070;}.s2{background:rgba(51,138,115,.15);color:var(--dark-teal);}
.shift-input{width:100%;border:none;background:transparent;font-size:11px;text-align:center;outline:none;padding:2px;font-family:var(--sans);}

/* LOG */
.log-entry{background:#fff;border:1px solid var(--border-soft);border-radius:var(--r-sm);padding:13px;margin-bottom:8px;}
.log-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.log-author{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--coral);text-transform:uppercase;letter-spacing:.5px;}
.log-time{font-size:11px;color:rgba(0,0,6,.3);}
.log-desc{font-size:13px;line-height:1.5;}
.log-action{font-size:12px;color:var(--teal);margin-top:3px;font-weight:500;}

/* APPROVAL */
.appr{background:#fff;border:1px solid var(--border-soft);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow);}
.appr-hdr{background:rgba(0,0,6,.03);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.appr-body{padding:14px 16px;}
.appr-acts{display:flex;gap:8px;margin-top:12px;}
.appr-task{padding:7px 0;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px;font-size:13px;}
.appr-task:last-child{border-bottom:none;}
.dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.dot.y{background:rgba(51,138,115,.15);color:var(--teal);}
.dot.n{background:rgba(252,100,94,.12);color:var(--coral);}
.thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border-soft);cursor:pointer;flex-shrink:0;}

/* INCIDENTS */
.inc-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border-soft);border-radius:8px;margin-bottom:6px;background:#fff;}
.inc-row.has-g{border-left:3px solid var(--coral);}
.inc-lbl{flex:1;font-size:13px;}
.inc-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:var(--offwhite);font-family:var(--mono);}
.inc-btn.g-on{background:rgba(252,100,94,.1);border-color:var(--coral);color:var(--coral);}
.inc-btn.a-on{background:rgba(51,138,115,.1);border-color:var(--teal);color:var(--teal);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;font-family:var(--mono);cursor:pointer;border:none;transition:.15s;letter-spacing:.5px;text-transform:uppercase;}
.btn-p{background:var(--black);color:var(--offwhite);}
.btn-p:hover{background:#222;}
.btn-ok{background:var(--teal);color:#fff;}
.btn-ok:hover{background:var(--dark-teal);}
.btn-err{background:var(--coral);color:#fff;}
.btn-out{background:transparent;border:1.5px solid var(--border);color:rgba(0,0,6,.5);}
.btn-full{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);}
.b-pend{background:rgba(244,209,96,.3);color:#7a6200;}
.b-sub{background:rgba(184,212,216,.4);color:#1a6070;}
.b-appr{background:rgba(51,138,115,.15);color:var(--dark-teal);}
.b-rej{background:rgba(252,100,94,.12);color:var(--dark-coral);}

/* MISC */
.card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--r-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-family:var(--mono);font-size:10px;font-weight:700;color:rgba(0,0,6,.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-family:var(--mono);font-size:10px;font-weight:700;color:rgba(0,0,6,.35);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--sans);color:var(--black);background:#fff;outline:none;transition:.2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal);}
.note-box{background:rgba(244,209,96,.15);border:1px solid rgba(244,209,96,.4);border-radius:8px;padding:10px 12px;font-size:12px;color:#7a6200;margin:8px 0;}
.alert{padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-info{background:rgba(184,212,216,.2);color:#1a6070;border:1px solid rgba(184,212,216,.5);}
.alert-ok{background:rgba(51,138,115,.1);color:var(--dark-teal);border:1px solid rgba(51,138,115,.25);}
.alert-warn{background:rgba(244,209,96,.15);color:#7a6200;border:1px solid rgba(244,209,96,.4);padding:14px;border-left:4px solid var(--peach);}
.alert-err{background:rgba(252,100,94,.1);color:var(--dark-coral);border:1px solid rgba(252,100,94,.3);}
.sep{height:1px;background:var(--border-soft);margin:16px 0;}
.empty{text-align:center;padding:3rem 1rem;color:rgba(0,0,6,.3);}
.missing-banner{background:rgba(244,209,96,.15);border:1px solid rgba(244,209,96,.5);border-radius:10px;padding:14px;margin-bottom:16px;}
.missing-banner .title{font-family:var(--mono);font-size:11px;font-weight:700;color:#7a6200;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.missing-banner .item{font-size:12px;color:var(--dark-coral);padding:4px 0;display:flex;align-items:center;gap:8px;}
.missing-banner .item::before{content:"⚠";font-size:13px;}
.loading{text-align:center;padding:3rem;color:rgba(0,0,6,.25);}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--offwhite);padding:10px 20px;border-radius:24px;font-size:12px;font-family:var(--mono);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,6,.2);letter-spacing:.5px;}
.toast.show{opacity:1;}
.tabs{display:flex;gap:2px;background:rgba(0,0,6,.05);padding:3px;border-radius:10px;margin-bottom:14px;}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--mono);cursor:pointer;color:rgba(0,0,6,.35);transition:.15s;text-transform:uppercase;letter-spacing:.5px;}
.tab.active{background:#fff;color:var(--black);box-shadow:0 1px 4px rgba(0,0,6,.08);}
</style>
</head>

let S={user:null,userDoc:null,currentForm:null,currentSubId:null,taskStates:{},incidentStates:{},navStack:[],currentNav:'sop'};

function today(){return new Date().toISOString().slice(0,10);}
function shiftNow(){const h=new Date().getHours();return(h>=7&&h<16)?1:2;}

// ================================================================
// FIREBASE HELPERS
// ================================================================
async function saveSubmission(formId,data){
  const r=await addDoc(collection(db,'submissions'),{formId,date:today(),shift:shiftNow(),userId:S.user.uid,userName:S.userDoc.name,userRole:S.userDoc.role,status:'submitted',...data,createdAt:serverTimestamp()});
  return r.id;
}
async function updateSubmission(id,data){await updateDoc(doc(db,'submissions',id),data);}
async function uploadPhoto(taskId,file){
  const path=`photos/${today()}/${S.user.uid}_${taskId}_${Date.now()}`;
  const r=sRef(stor,path);await uploadBytes(r,file);return getDownloadURL(r);
}
async function getTodaySubmissions(uid){
  const q=query(collection(db,'submissions'),where('date','==',today()),where('userId','==',uid));
  const snap=await getDocs(q);const res={};snap.forEach(d=>res[d.data().formId]={id:d.id,...d.data()});return res;
}
async function getPending(){
  const q=query(collection(db,'submissions'),where('status','==','submitted'),orderBy('createdAt','desc'),limit(50));
  const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function getAllToday(){
  const q=query(collection(db,'submissions'),where('date','==',today()));
  const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function getShift(){
  const snap=await getDoc(doc(db,'config','weekly_shift'));
  return snap.exists()?snap.data():{weeks:{}};
}

function renderApprovalList(items){
  if(!items.length)return'<div class="empty">✅ Onay bekleyen form yok.</div>';
  return items.map(sub=>{
    const form=FORMS.find(f=>f.id===sub.formId);if(!form)return'';
    const all=form.sections.flatMap(s=>s.tasks);
    const done=Object.values(sub.taskStates||{}).filter(t=>t.checked).length;
    return`<div class="appr">
      <div class="appr-hdr">
        <div><div style="font-size:14px;font-weight:600;">${form.icon} ${form.title}</div>
        <div style="font-size:12px;color:var(--g4);">${sub.userName} · ${sub.createdAt?.toDate?.().toLocaleString('tr-TR')||'Az önce'}</div></div>
        <span class="badge b-sub">Bekliyor</span></div>
      <div class="appr-body">
        <div style="font-size:13px;margin-bottom:8px;">${done} / ${all.length} görev tamamlandı</div>
        <div style="max-height:200px;overflow-y:auto;">
          ${all.map(t=>{const ts=(sub.taskStates||{})[t.id]||{};
            return`<div class="appr-task"><div class="dot ${ts.checked?'y':'n'}">${ts.checked?'✓':'✗'}</div>
              <div style="flex:1;font-size:12px;">${t.text}${t.critical?'<span style="color:var(--accent);"> ★</span>':''}</div>
              ${ts.photoUrl?`<img class="thumb" src="${ts.photoUrl}" onclick="viewPhoto('${ts.photoUrl}')"/>`:''}</div>`;}).join('')}
        </div>
        ${sub.note?`<div class="note-box">📝 ${sub.note}</div>`:''}
        <div class="appr-acts">
          <button class="btn btn-ok" style="flex:1;" onclick="approveS('${sub.id}')">✓ Onayla</button>
          <button class="btn btn-err" style="flex:1;" onclick="rejectS('${sub.id}')">✗ Reddet</button>
        </div>
      </div></div>`;}).join('');
}

window.openForm=async function(formId){
  const form=FORMS.find(f=>f.id===formId);if(!form)return;
  S.currentForm=form;S.taskStates={};S.incidentStates={};
  S.navStack.push(()=>renderSOP());
  _setTitleOld(form.title);_showBackOld(true);
  const el=document.getElementById('main-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const subs=await getTodaySubmissions(S.user.uid);
  const existing=subs[formId];
  if(existing){S.taskStates=existing.taskStates||{};S.incidentStates=existing.incidentStates||{};S.currentSubId=existing.id;}
  renderFormView(form,existing);
};

function renderFormView(form,existing){
  const allTasks=form.sections.flatMap(s=>s.tasks);
  const isRO=existing&&(existing.status==='submitted'||existing.status==='approved');
  let html='';
  if(form.note)html+=`<div class="note-box">ℹ️ ${form.note}</div>`;
  if(existing){
    const sm={submitted:'Onay Bekliyor',approved:'Onaylandı ✓',rejected:'Reddedildi ✗'};
    const sc={submitted:'alert-info',approved:'alert-ok',rejected:'alert-err'};
    html+=`<div class="alert ${sc[existing.status]||'alert-info'}">${sm[existing.status]||existing.status}</div>`;
    if(existing.managerNote)html+=`<div class="note-box">Yönetici: ${existing.managerNote}</div>`;
  }
  form.sections.forEach(sec=>{
    html+=`<div class="sec-hdr">${sec.title}</div>`;
    sec.tasks.forEach(task=>{
      const ts=S.taskStates[task.id]||{};const checked=!!ts.checked;const hasPhoto=!!ts.photoUrl;
      html+=`<div class="task ${checked?'done':''} ${task.critical?'crit':''}" id="task-${task.id}">
        <div class="task-row">
          <div class="chk ${checked?'on':''}" data-id="${task.id}" ${isRO?'':'onclick="toggleTask(this.dataset.id)"'}>${checked?'✓':''}</div>
          <div style="flex:1;"><div class="task-txt ${checked?'done':''}">${task.text}</div>
          ${task.critical?'<div class="crit-lbl">★ Fotoğraf zorunlu</div>':''}</div>
        </div>
        ${task.critical&&!isRO?`<div class="photo-area" id="pa-${task.id}">${hasPhoto?`<div class="photo-ok">✓ Fotoğraf eklendi</div><img class="photo-preview" src="${ts.photoUrl}" onclick="viewPhoto('${ts.photoUrl}')"/>`:`<div class="photo-btn" onclick="triggerPhoto('${task.id}')">📷 Fotoğraf Çek / Ekle</div>`}</div>`:''} 
        ${task.critical&&isRO&&hasPhoto?`<img class="photo-preview" src="${ts.photoUrl}" onclick="viewPhoto('${ts.photoUrl}')"/>`:''}</div>`;
    });
  });
  html+=`<div style="margin-top:24px;"><div class="sec-hdr">Olağandışı Olaylar</div>
    <div style="font-size:12px;color:var(--g4);margin-bottom:10px;">G = Gerçekleşti · A = Aksiyon Alındı</div>`;
  INCIDENTS.forEach((inc,i)=>{
    const st=S.incidentStates[inc]||{};
    html+=`<div class="inc-row ${st.g?'has-g':''}" id="inc-${i}">
      <div class="inc-lbl">${inc}</div>
      <button class="inc-btn ${st.g?'g-on':''}" ${isRO?'disabled':''} onclick="toggleInc('${inc}','g')">G</button>
      <button class="inc-btn ${st.a?'a-on':''}" ${isRO?'disabled':''} onclick="toggleInc('${inc}','a')">A</button>
    </div>`;
  });
  html+='</div>';
  if(!isRO)html+=`<div style="margin-top:16px;"><div class="sec-hdr">Vardiya Notu</div>
    <div class="fg" style="margin-top:8px;"><textarea id="shift-note" rows="3" placeholder="Önemli bir durum varsa...">${existing?.note||''}</textarea></div></div>`;
  else if(existing?.note)html+=`<div class="note-box" style="margin-top:16px;">📝 ${existing.note}</div>`;
  html+='<div style="height:80px;"></div>';
  document.getElementById('main-content').innerHTML=html;
  if(!isRO){updateProgress(form);_showSBarOld(true);}else _showSBarOld(false);
}

function updateProgress(form){
  const all=form.sections.flatMap(s=>s.tasks);
  const checked=all.filter(t=>S.taskStates[t.id]?.checked).length;
  const critMiss=all.filter(t=>t.critical&&S.taskStates[t.id]?.checked&&!S.taskStates[t.id]?.photoUrl).length;
  document.getElementById('prog-txt').textContent=`${checked} / ${all.length} görev`;
  const btn=document.getElementById('sub-btn');btn.disabled=critMiss>0;
}

window.toggleTask=function(id){
  if(!S.taskStates[id])S.taskStates[id]={};S.taskStates[id].checked=!S.taskStates[id].checked;
  const el=document.getElementById('task-'+id);const chk=el.querySelector('.chk');const txt=el.querySelector('.task-txt');const c=S.taskStates[id].checked;
  chk.className='chk'+(c?' on':'');chk.textContent=c?'✓':'';txt.className='task-txt'+(c?' done':'');
  el.className=el.className.replace('done','').trim()+(c?' done':'');
  updateProgress(S.currentForm);autoSave();
};
window.toggleInc=function(name,type){
  if(!S.incidentStates[name])S.incidentStates[name]={};S.incidentStates[name][type]=!S.incidentStates[name][type];
  const i=INCIDENTS.indexOf(name);const row=document.getElementById('inc-'+i);
  if(type==='g'){row.className='inc-row'+(S.incidentStates[name].g?' has-g':'');row.querySelectorAll('.inc-btn')[0].className='inc-btn'+(S.incidentStates[name].g?' g-on':'');}
  else{row.querySelectorAll('.inc-btn')[1].className='inc-btn'+(S.incidentStates[name].a?' a-on':'');}
};
let pendingPhotoId=null;
window.triggerPhoto=function(id){pendingPhotoId=id;document.getElementById('photo-input').click();};
document.getElementById('photo-input').addEventListener('change',async function(e){

    if(area)area.innerHTML=`<div class="photo-ok">✓ Fotoğraf eklendi</div><img class="photo-preview" src="${url}" onclick="viewPhoto('${url}')"/>`;

  catch{showToast('Fotoğraf yüklenemedi.');if(area)area.innerHTML=`<div class="photo-btn" onclick="triggerPhoto('${id}')">📷 Tekrar Dene</div>`;}
  this.value='';pendingPhotoId=null;
});
window.viewPhoto=function(url){window.open(url,'_blank');};
let autoSaveTimer=null;

    <div style="font-size:15px;font-weight:700;margin-top:2px;">Vardiya Planı</div></div>`;
  if(isManager){
    html+=`<div class="alert alert-info" style="margin-bottom:12px;">📝 Hücrelere tıklayarak düzenleyebilirsiniz.</div>`;
  }else{
    html+=`<div class="alert alert-info" style="margin-bottom:12px;">📅 Bu haftanın vardiya planı aşağıdadır.</div>`;
  }
  html+=`<div class="shift-grid"><table class="shift-table"><thead><tr>
    <th style="text-align:left;padding-left:10px;">Pozisyon</th>
    ${SHIFT_DAYS.map(d=>`<th>${d.slice(0,3)}</th>`).join('')}
  </tr></thead><tbody>`;
  SHIFT_POSITIONS.forEach((pos,pi)=>{
    html+=`<tr><td>${pos}</td>`;
    SHIFT_DAYS.forEach((day,di)=>{
      const val=week[`${pi}_${di}`]||'';
      if(isManager){
        html+=`<td><input type="text" value="${val}" style="width:100%;border:none;background:transparent;font-size:11px;text-align:center;outline:none;padding:2px;" oninput="updateShiftCell(${pi},${di},this.value)" placeholder="—"/></td>`;
      }else{
        const cls=val&&val.includes('1.')?'s1':val&&val.includes('2.')?'s2':val?'s1':'';
        html+=`<td>${val?`<span class="shift-cell ${cls}">${val}</span>`:'-'}</td>`;
      }
    });
    html+='</tr>';
  });
  html+=`</tbody></table></div>`;
  if(isManager){
    html+=`<div style="margin-top:16px;"><button class="btn btn-p btn-full" onclick="saveShiftPlan()">💾 Shift Planını Kaydet</button></div>`;
  }
  html+='<div style="height:20px;"></div>';
  el.innerHTML=html;
  window._shiftData=shiftData;window._weekKey=weekKey;
}

window.updateShiftCell=function(pi,di,val){
  if(!window._shiftData.weeks)window._shiftData.weeks={};
  if(!window._shiftData.weeks[window._weekKey])window._shiftData.weeks[window._weekKey]={};
  window._shiftData.weeks[window._weekKey][`${pi}_${di}`]=val;
};
window.saveShiftPlan=async function(){
  try{await saveShift(window._shiftData);showToast('Shift planı kaydedildi ✓');}
  catch{showToast('Kaydetme hatası.');}
};
function getWeekKey(){const d=new Date();const day=d.getDay()||7;const mon=new Date(d);mon.setDate(d.getDate()-day+1);return mon.toISOString().slice(0,10);}
function getWeekLabel(){const d=new Date();const day=d.getDay()||7;const mon=new Date(d);mon.setDate(d.getDate()-day+1);const sun=new Date(mon);sun.setDate(mon.getDate()+6);const fmt=dt=>dt.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});return`${fmt(mon)} – ${fmt(sun)}`;}

async function renderLogbook(){
  _setTitleOld('Operasyonel Logbook');
  const el=document.getElementById('main-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const q=query(collection(db,'logbook'),orderBy('createdAt','desc'),limit(30));
  const snap=await getDocs(q);
  const entries=snap.docs.map(d=>({id:d.id,...d.data()}));
  let html=`<div class="card" style="margin-bottom:16px;">
    <div class="card-title">Yeni Kayıt Ekle</div>
    <div class="fg"><label>Sorun / Açıklama</label><textarea id="log-desc" rows="3" placeholder="Gözlemlenen sorunu açıklayın..."></textarea></div>
    <div class="fg"><label>Alınan Aksiyon</label><input type="text" id="log-action" placeholder="Yapılan işlem..."/></div>
    <div class="fg"><label>Bildirilen Kişi / Birim</label><input type="text" id="log-reported" placeholder="Örn: Teknik servis"/></div>
    <button class="btn btn-p btn-full" onclick="addLog()">Kayıt Ekle</button></div>`;
  if(entries.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Son Kayıtlar</div>`;
    entries.forEach(e=>{html+=`<div class="card" style="padding:12px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:700;color:var(--accent);">${e.user||'—'} · ${e.role||''}</span>
        <span style="font-size:11px;color:var(--g4);">${e.createdAt?.toDate?.().toLocaleString('tr-TR')||''}</span></div>
      <div style="font-size:13px;">${e.description}</div>
      ${e.action?`<div style="font-size:12px;color:var(--ok);margin-top:3px;">Aksiyon: ${e.action}</div>`:''}
      ${e.reported?`<div style="font-size:11px;color:var(--g4);">Bildirildi: ${e.reported}</div>`:''}
    </div>`;});
  }else html+='<div class="empty">📋 Henüz kayıt yok.</div>';
  html+='<div style="height:20px;"></div>';
  el.innerHTML=html;
}
window.addLog=async function(){
  const desc=document.getElementById('log-desc').value.trim();
  if(!desc){showToast('Açıklama gereklidir.');return;}
  const action=document.getElementById('log-action').value.trim();
  const reported=document.getElementById('log-reported').value.trim();
  await addDoc(collection(db,'logbook'),{description:desc,action,reported,user:S.userDoc.name,role:S.userDoc.role,createdAt:serverTimestamp()});
  showToast('Kayıt eklendi ✓');renderLogbook();
};

  const el=document.getElementById('main-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';

  const filtered=items.filter(s=>s.status==='submitted');
  let html='<div class="form-list">';
  if(!filtered.length){html+='<div class="empty">✅ Onay bekleyen form yok.</div>';}
  else{html+=renderApprovalList(filtered);}
  html+='</div>';

};

window.openAllForms=function(){
  setTitle('Tüm Formlar');showBack(true);
  S.navStack.push(()=>renderSOP());
  const el=document.getElementById('main-content');
  let html='<div class="form-list">';
  FORMS.forEach(f=>{html+=formItemHTML(f,null);});
  html+='</div>';

};

function formItemHTML(f,sub){
  let badge='',bc='rgba(0,0,6,.04)';
  if(!sub){badge='<span class="badge b-pend">Bekliyor</span>';bc='rgba(244,209,96,.1)';}
  else if(sub.status==='approved'){badge='<span class="badge b-appr">Onaylandı</span>';bc='rgba(51,138,115,.08)';}
  else if(sub.status==='rejected'){badge='<span class="badge b-rej">Reddedildi</span>';bc='rgba(252,100,94,.08)';}
  else{badge='<span class="badge b-sub">Onay Bekliyor</span>';bc='rgba(184,212,216,.15)';}
  const total=f.sections.reduce((s,sec)=>s+sec.tasks.length,0);
  return`<div class="form-item" onclick="openForm('${f.id}')" style="background:${bc};">
    <div class="fi-icon" style="background:rgba(51,138,115,.1);">${f.icon}</div>
    <div class="fi-info">
      <div class="fi-title">${f.title}</div>
      <div class="fi-meta">${total} görev · ${['','1. Vardiya','2. Vardiya'][f.shift]||'Her Vardiya'}</div>
      <div style="margin-top:4px;">${badge}</div>
    </div>
    <div class="fi-arr">›</div>
  </div>`;
}

// Override openForm to navigate back to SOP
const _origOpenForm=window.openForm;
window.openForm=async function(formId){
  const form=FORMS.find(f=>f.id===formId);if(!form)return;
  S.currentForm=form;S.taskStates={};S.incidentStates={};
  if(!S.navStack.length)S.navStack.push(()=>renderSOP());
  setTitle(form.title);showBack(true);
  const el=document.getElementById('main-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const subs=await getTodaySubmissions(S.user.uid);
  const existing=subs[formId];
  if(existing){S.taskStates=existing.taskStates||{};S.incidentStates=existing.incidentStates||{};S.currentSubId=existing.id;}
  renderFormView(form,existing);
};

// Helper overrides
function setTitle(t){document.getElementById('ttl').textContent=t;}
function showBack(b){const btn=document.getElementById('back-btn');btn.style.display=b?'flex':'none';btn.classList.toggle('visible',b);}
function showSBar(b){document.getElementById('sbar').style.display=b?'flex':'none';}

// Init nav on login
onAuthStateChanged(auth,async user=>{
  if(user){
    S.user=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()){showLErr('Kullanıcı profili bulunamadı.');signOut(auth);return;}
    S.userDoc=snap.data();
    showScreen('app-screen');
    const roleLabels={admin:'Admin',manager:'Manager',bar_sef:'Bar Şefi',barista:'Barista',jr_barista:'Jr. Barista',komi:'Komi',temizlik:'Temizlik',gece_bekcisi:'Bekçi'};
    const uinfo=document.getElementById('uinfo');
    uinfo.textContent=roleLabels[S.userDoc.role]||S.userDoc.role;
    uinfo.className=`t-role ${S.userDoc.role==='admin'?'role-admin':S.userDoc.role==='manager'?'role-manager':'role-staff'}`;
    navTo('sop');
  }else{
    S.user=null;S.userDoc=null;
    showScreen('login-screen');
    document.getElementById('lbtn').disabled=false;document.getElementById('lbtn').textContent='Giriş Yap →';
  }
});

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showLErr(m){const e=document.getElementById('lerr');e.textContent=m;e.style.display='block';}
